apiVersion: apps/v1
kind: ReplicaSet

metadata:
  name: nginx-rs
  namespace: applications

spec:
  replicas: 4

  selector:
    matchLabels:
      app: nginx-rs

  template:
    metadata:
      labels:
        app: nginx-rs

    spec:
      containers:
      - name: nginx
        image: nginx:1.28
        ports:
        - containerPort: 80
